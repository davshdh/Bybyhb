<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESCUE MISSION: SANITY</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e293b;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .img-container {
            width: 100%;
            background: #000;
            line-height: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            padding: 25px;
        }

        .badge {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
            display: inline-block;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 800;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 12px;
            background: #334155;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .fill {
            height: 100%;
            background: #6366f1;
            width: 2%; /* <--- TADY ZMĚŇ PROGRES */
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .btn {
            display: block;
            background: #6366f1;
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>

<div class="card">
    <div class="img-container">
        <img src="https://i.ibb.co/sJ1gVCm8/Blur-16284-copy.jpg" alt="The Tool">
    </div>

    <div class="content">
        <div class="badge">Status: Critical</div>
        <h1>Ultimate Squeeze Toy</h1>
        <p>Boss is a demon. Stress level 999. This is the only thing keeping me from a total meltdown. Help me fund it. 💀</p>

        <div class="progress-bar">
            <div class="fill"></div>
        </div>
        
        <div class="stats">
            <span>$0 raised</span>
            <span style="color: #4ade80;">$50 goal</span>
        </div>

        <a href="TVUJ_LINK" class="btn">Fund My Sanity</a>
    </div>
</div>

</body>
</html>
