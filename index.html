<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Mission: Ultimate Squeeze Toy</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e293b;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .image-container {
            width: 100%;
            background-color: #000;
            line-height: 0;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            padding: 30px;
        }

        .badge {
            background-color: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 15px 0;
            line-height: 1.2;
            font-weight: 800;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .progress-section {
            background: rgba(15, 23, 42, 0.4);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 12px;
            background-color: #334155;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            width: 0%; /* Tady nastav reálné procento */
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .stat-group b {
            font-size: 20px;
            color: #fff;
            display: block;
        }

        .stat-group span {
            color: #64748b;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 600;
        }

        .btn {
            display: block;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 17px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(79, 70, 229, 0.6);
            filter: brightness(1.1);
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #475569;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="image-container">
            <img src="https://lh3.googleusercontent.com/u/0/d/1B_ZDQkHLTy8GBagr1ieG7T-xnslFMhGc" alt="The Ultimate Squeeze Toy">
        </div>

        <div class="content">
            <div class="badge">Active Mission</div>
            
            <h1>Ultimate Squeeze Toy</h1>
            
            <p>
                My boss is a literal demon and the stress is reaching critical levels. I need this <b>ergonomic masterpiece</b> to keep my sanity. Every dollar brings me closer to peace.
            </p>

            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="stats">
                    <div class="stat-group">
                        <b>$0</b>
                        <span>Raised</span>
                    </div>
                    <div class="stat-group" style="text-align: right;">
                        <b style="color: #4ade80;">$50</b>
                        <span>Goal (0%)</span>
                    </div>
                </div>
            </div>

            <a href="TVŮJ_PLATEBNÍ_ODKAZ" class="btn">Fund My Sanity</a>

            <div class="footer-note">
                Mission status: Critical. Survival depends on you.
            </div>
        </div>
    </div>

</body>
</html>
