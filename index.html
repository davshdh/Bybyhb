<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBLOCK THE TRUTH</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }
        .wrapper {
            width: 350px;
            text-align: center;
            border: 4px solid #ff0000;
            padding: 20px;
            background: #111;
        }
        .img-box {
            position: relative;
            background: #000;
            height: 300px;
            margin-bottom: 20px;
            border: 2px solid #333;
            overflow: hidden;
        }
        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(40px) brightness(0.5); /* Tohle je ten 'leak' efekt */
        }
        .img-box::after {
            content: 'UNLOCK AT 100%';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff0000;
            padding: 10px;
            font-size: 1.2rem;
            width: 80%;
            border: 2px solid #fff;
        }
        h1 { font-size: 1.4rem; color: #ff0000; margin: 0 0 10px 0; }
        p { font-size: 0.8rem; color: #aaa; margin-bottom: 20px; font-family: monospace; }
        .bar-bg { background: #222; height: 30px; border: 2px solid #fff; margin-bottom: 10px; position: relative; }
        .bar-fill { 
            background: #ff0000; 
            height: 100%; 
            width: 2%; /* Změň na 20% až tam sám hodíš pár korun */
            transition: 0.5s;
        }
        .bar-text { position: absolute; width: 100%; top: 5px; left: 0; font-size: 0.9rem; }
        .btn {
            display: block;
            background: #fff;
            color: #000;
            padding: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            border: 4px solid #ff0000;
        }
        .btn:hover { background: #ff0000; color: #fff; }
        .timer { font-size: 0.7rem; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Mission: Sanity</h1>
    <p>Boss is a demon. I'm one click away from losing it. Help me fund this "object" before the timer hits zero.</p>

    <div class="img-box">
        <img src="https://lh3.googleusercontent.com/d/1B_ZDQkHLTy8GBagr1ieG7T-xnslFMhGc" alt="Classified">
    </div>

    <div class="bar-bg">
        <div class="bar-fill"></div>
        <div class="bar-text">$0 / $50 FUNDED</div>
    </div>

    <a href="TVŮJ_PAYPAL_LINK" class="btn">LEAK THE PHOTO ($1)</a>

    <div class="timer">SYSTEM_SHUTDOWN_IN: 23:54:12</div>
</div>

</body>
</html>
