<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue Mission - Toy Fund</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e293b;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .image-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* Perfektní čtverec pro fotku */
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .content {
            padding: 28px;
        }

        .badge {
            background-color: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 12px 0;
            line-height: 1.2;
            font-weight: 800;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .progress-section {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 10px;
            background-color: #334155;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            width: 2%; /* Tady nastavíš reálný progres */
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }

        .stat-box b {
            display: block;
            font-size: 18px;
            color: #fff;
        }

        .stat-box span {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
        }

        .btn {
            display: block;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            text-align: center;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.5);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="image-container">
            <img src="https://lh3.googleusercontent.com/d/1B_ZDQkHLTy8GBagr1ieG7T-xnslFMhGc" alt="Ultimate Squeeze Toy">
        </div>

        <div class="content">
            <div class="badge">Rescue Mission</div>
            
            <h1>Ultimate Squeeze Toy</h1>
            
            <p>
                My boss is a demon and the stress is reaching critical levels. I need this <b>ergonomic masterpiece</b> to survive the week. Help me buy some sanity.
            </p>

            <div class="progress-section">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <div class="stats">
                    <div class="stat-box">
                        <b>$0</b>
                        <span>Raised</span>
                    </div>
                    <div class="stat-box" style="text-align: right;">
                        <b style="color: #4ade80;">$50</b>
                        <span>Goal (0%)</span>
                    </div>
                </div>
            </div>

            <a href="TVŮJ_PAYPAL_ODKAZ" class="btn">Support My Sanity</a>
        </div>
    </div>

</body>
</html>
