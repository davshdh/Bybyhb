<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Fund</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e293b;
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .img-container {
            width: 100%;
            background: #000;
            line-height: 0;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            padding: 28px;
        }

        .status {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #fb7185;
            margin-bottom: 8px;
            display: block;
        }

        h1 {
            font-size: 26px;
            margin: 0 0 16px 0;
            font-weight: 800;
            line-height: 1.1;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .progress-box {
            background: rgba(15, 23, 42, 0.6);
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .bar-bg {
            height: 10px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #fb7185, #e11d48);
            width: 2%; /* <--- Tady můžeš přepisovat procenta podle peněz */
            box-shadow: 0 0 10px rgba(251, 113, 133, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
        }

        .btn {
            display: block;
            background: #f1f5f9;
            color: #0f172a;
            text-align: center;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 16px;
            transition: 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #475569;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="img-container">
        <img src="https://i.ibb.co/sJ1gVCm8/Blur-16284-copy.jpg" alt="The Upgrade">
    </div>

    <div class="content">
        <span class="status">● Sanity Status: Critical</span>
        <h1>Stop the caveman era.</h1>
        
        <p>
            Let's be real. Help me buy a decent pocket pussy so I can stop jerking off like a caveman. Target: $50 (no cheap AliExpress crap). 
        </p>

        <div class="progress-box">
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
            <div class="stats">
                <span>$0 raised</span>
                <span style="color: #fb7185;">Goal: $50</span>
            </div>
        </div>

        <a href="https://paypal.me/Davisoppxx" target="_blank" class="btn">End the Struggle</a>

        <div class="footer">
            No corporate BS. Just pure transparency.
        </div>
    </div>
</div>

</body>
</html>
