<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Fund</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: #1e293b;
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .img-container {
            width: 100%;
            background: #000;
            line-height: 0;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content {
            padding: 28px;
        }

        .status {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #4ade80;
            margin-bottom: 8px;
            display: block;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 16px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .progress-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .bar-bg {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .bar-fill {
            height: 100%;
            background: #6366f1;
            width: 0%; /* Změň podle toho, kolik ti přistane */
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
        }

        .btn {
            display: block;
            background: #f1f5f9;
            color: #0f172a;
            text-align: center;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #475569;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="img-container">
        <img src="https://i.ibb.co/sJ1gVCm8/Blur-16284-copy.jpg" alt="Object">
    </div>

    <div class="content">
        <span class="status">● Sanity Tracker</span>
        <h1>The Stress Solution</h1>
        
        <p>
            The corporate grind is undefeated. I found this ergonomic masterpiece and now it's a matter of survival. One dollar = one minute of peace. 
        </p>

        <div class="progress-box">
            <div class="bar-bg">
                <div class="bar-fill"></div>
            </div>
            <div class="stats">
                <span>$0 raised</span>
                <span style="color: #4ade80;">Goal: $50</span>
            </div>
        </div>
