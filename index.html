<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Upgrade Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d94;
            --secondary: #7000ff;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(255, 77, 148, 0.15) 0%, transparent 50%);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
        }

        .image-wrapper {
            width: 100%;
            height: 380px;
            position: relative;
            background: #000;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        .content {
            padding: 32px;
            text-align: center;
        }

        .tag {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            padding: 6px 16px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            margin: 0 0 16px 0;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff 60%, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #9ca3af;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 32px;
            font-weight: 300;
        }

        p b {
            color: #fff;
            font-weight: 600;
        }

        .progress-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 32px;
        }

        .bar-container {
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 2%; /* <--- TADY UPRAV PROGRES */
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            box-shadow: 0 0 20px rgba(255, 77, 148, 0.4);
            border-radius: 4px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        .stats span:last-child {
            color: var(--primary);
        }

        .pay-button {
            display: block;
            width: 100%;
            background: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .pay-button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.1);
            background: #f8f8f8;
        }

        .secure-note {
            margin-top: 20px;
            font-size: 12px;
            color: #4b5563;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="image-wrapper">
        <img src="https://i.ibb.co/sJ1gVCm8/Blur-16284-copy.jpg" alt="The Upgrade">
    </div>

    <div class="content">
        <div class="tag">Human Evolution</div>
        <h1>Stop the caveman era.</h1>
        
        <p>
            Let's be real. Help me buy a decent <b>pocket pussy</b> so I can stop jerking off like a caveman. Target: $50 (no cheap AliExpress crap).
        </p>

        <div class="progress-card">
            <div class="bar-container">
                <div class="bar-fill"></div>
            </div>
            <div class="stats">
                <span>$0 raised</span>
                <span>Goal: $50</span>
            </div>
        </div>

        <a href="https://paypal.me/Davisoppxx" class="pay-button">End the Struggle</a>

        <div class="secure-note">
            Direct via PayPal • 100% Transparency
        </div>
    </div>
</div>

</body>
</html>
